version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: iptrack-postgres
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-iptrack}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iptrack-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: iptrack-redis
    command: >
      sh -c '
      if [ -n "$REDIS_PASSWORD" ]; then
        redis-server --requirepass "$REDIS_PASSWORD"
      else
        redis-server
      fi
      '
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iptrack-network

  # Backend Core Service (Switches, IP Lookup, History, Alarms, SNMP)
  backend-core:
    image: ip-track-backend:latest
    container_name: iptrack-backend-core
    ports:
      - "8101:8100"
    env_file:
      - .env
    environment:
      DATABASE_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - ./backend/src:/app/src
      - ./backend/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - iptrack-network
    restart: unless-stopped
    command: ["uvicorn", "main_core:app", "--host", "0.0.0.0", "--port", "8100"]

  # Backend IPAM Service (IP Address Management)
  backend-ipam:
    image: ip-track-backend:latest
    container_name: iptrack-backend-ipam
    ports:
      - "8102:8100"
    env_file:
      - .env
    environment:
      DATABASE_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - ./backend/src:/app/src
      - ./backend/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - iptrack-network
    restart: unless-stopped
    command: ["uvicorn", "main_ipam:app", "--host", "0.0.0.0", "--port", "8100"]

  # Backend Collection Service (Network Data Collection, Discovery)
  backend-collector:
    image: ip-track-backend:latest
    container_name: iptrack-backend-collector
    ports:
      - "8103:8100"
    env_file:
      - .env
    environment:
      DATABASE_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - ./backend/src:/app/src
      - ./backend/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - iptrack-network
    restart: unless-stopped
    command: ["uvicorn", "main_collector:app", "--host", "0.0.0.0", "--port", "8100"]

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: iptrack-frontend
    ports:
      - "${FRONTEND_PORT:-8001}:5173"
    environment:
      VITE_API_BASE_URL: ""
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - /app/node_modules
    depends_on:
      - backend-core
      - backend-ipam
      - backend-collector
    networks:
      - iptrack-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  iptrack-network:
    driver: bridge
